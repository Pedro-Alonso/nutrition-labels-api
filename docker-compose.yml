services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    # .env fornece GROQ_API_KEY (e demais chaves) ao container.
    # Valores em `environment:` abaixo têm precedência sobre o env_file.
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://rotulos_user:rotulos_pass@db:5432/rotulos_db"
      SECRET_KEY: "dev-secret-key-nao-usar-em-producao-32bytes!"
      GOOGLE_APPLICATION_CREDENTIALS: "/app/secrets/service_account.json"
      TESSDATA_PREFIX: "/usr/share/tesseract-ocr/5/tessdata"
    volumes:
      - ./secrets/service_account.json:/app/secrets/service_account.json:ro
      - ./app:/app/app:ro
      - ./ocr_engine:/app/ocr_engine:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rotulos_db
      POSTGRES_USER: rotulos_user
      POSTGRES_PASSWORD: rotulos_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rotulos_user -d rotulos_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
